; OPcache Configuration - Optimized for Production
[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
; In production container images files never change at runtime.
; validate_timestamps=0 eliminates the stat() syscall on every request.
; Restart the container to pick up new code instead.
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1

; JIT Configuration (PHP 8.4)
opcache.jit=tracing
opcache.jit_buffer_size=128M

; Performance
opcache.save_comments=1
opcache.enable_file_override=1
