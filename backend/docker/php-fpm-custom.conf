[www]
; Worker user/group — php-fpm master runs as root, workers as www-data
user = www-data
group = www-data

; Listen on TCP port 9000 (default, matches Dockerfile EXPOSE and nginx upstream)
listen = 9000
; Allow connections from any IP (required for Docker networking)
; Note: Do NOT set listen.allowed_clients when using TCP - it only works with Unix sockets
; For TCP, access control should be done via firewall/network policies

; Process manager configuration - Optimized for 5,000-50,000 users
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 500

; Performance tuning
pm.process_idle_timeout = 10s
request_terminate_timeout = 120s

; Slow log for debugging performance issues
slowlog = /var/www/html/storage/logs/php-fpm-slow.log
request_slowlog_timeout = 5s

; Logging
php_admin_value[error_log] = /var/www/html/storage/logs/php-fpm-error.log
php_admin_flag[log_errors] = on

; Resource limits
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 120
