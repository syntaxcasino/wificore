; OPcache Configuration for Production Performance
; Place this in /usr/local/etc/php/conf.d/opcache.ini

; Enable OPcache
opcache.enable=1
opcache.enable_cli=1

; Memory settings
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

; Performance tuning
opcache.revalidate_freq=2
opcache.fast_shutdown=1
opcache.save_comments=1
opcache.optimization_level=0xFFFFFFFF
opcache.jit_buffer_size=100M
opcache.jit=tracing

; Validate timestamps in development only
; In production, set to 0 for maximum performance
; Use opcache_reset() or reload to clear cache
opcache.validate_timestamps=0

; File caching for better performance
opcache.file_cache=/tmp/opcache
opcache.file_cache_only=0
opcache.file_cache_consistency_checks=1

; Prevent caching large files
opcache.max_file_size=0

; User cache - useful for application caching
opcache.user_cache_size=64M
opcache.user_cache_ttl=300
