; PHP-FPM Optimized Configuration for High-Performance SaaS
; Place this in /usr/local/etc/php-fpm.d/www.conf (overwrite or include)

[global]
; Process manager settings
pid = /var/run/php-fpm.pid
daemonize = no

; Logging - reduce for production performance
error_log = /proc/self/fd/2
log_level = warning
log_limit = 8192

; Emergency restart threshold
emergency_restart_threshold = 10
emergency_restart_interval = 1m
process_control_timeout = 10s

[www]
; User/group settings
user = www-data
group = www-data

; Socket or port - use socket for better performance with nginx
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Performance tuning - ondemand for memory efficiency
pm = ondemand
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Memory limit per process
php_admin_value[memory_limit] = 512M

; Request timeout
request_terminate_timeout = 30s

; Environment variables
env[APP_ENV] = $APP_ENV
env[APP_DEBUG] = $APP_DEBUG

; Upload limits
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M

; Opcache settings (override with opcache.ini)
php_admin_flag[opcache.enable] = on
php_admin_flag[opcache.enable_cli] = on

; Disable dangerous functions
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Catch workers output
catch_workers_output = yes
decorate_workers_output = no

; Slow log for debugging slow requests
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 10s

; Status page for monitoring
pm.status_path = /fpm-status
ping.path = /ping
ping.response = pong
