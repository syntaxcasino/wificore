stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true

[group:laravel-queues-metrics]
programs=laravel-queue-dashboard,laravel-queue-metrics,laravel-queue-reports
priority=999
