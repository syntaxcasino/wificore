[program:laravel-queue-reports]
command=/usr/local/bin/php artisan queue:work --queue=reports --sleep=10 --tries=3 --timeout=600 --max-time=3600 --memory=256 --backoff=30,60,120
directory=/var/www/html
environment=LARAVEL_ENV="production"
autostart=true
autorestart=true
