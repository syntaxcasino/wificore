[program:laravel-queue-broadcasts]
command=/usr/local/bin/php artisan queue:work --queue=broadcasts --sleep=1 --tries=3 --timeout=30 --max-time=3600 --memory=128 --backoff=2,5,10
directory=/var/www/html
environment=LARAVEL_ENV="production"
autostart=true
autorestart=true
startretries=3
startsecs=5
stopwaitsecs=30
stopsignal=TERM
priority=3
user=www-data
numprocs=2
process_name=%(program_name)s_%(process_num)02d
redirect_stderr=false
stdout_logfile=/var/www/html/storage/logs/broadcasts-queue.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=7
stderr_logfile=/var/www/html/storage/logs/broadcasts-queue-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=7
stopasgroup=true
killasgroup=true

