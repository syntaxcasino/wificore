[program:octane]
command=php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=9000 --workers=%(ENV_OCTANE_WORKERS)s --max-requests=%(ENV_OCTANE_MAX_REQUESTS)s
directory=/var/www/html
autostart=true
autorestart=true
priority=5
user=www-data
stopwaitsecs=30
stopsignal=TERM

; Logging (stream to Docker logs)
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
