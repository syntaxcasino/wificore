resolver 127.0.0.11 valid=10s;

# ==============================================================================
# Performance Optimizations - Gzip Compression
# ==============================================================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# Map to set CORS headers
map $request_method $cors_method {
    OPTIONS 11;
    default 1;
}

server {
    listen 80;
    server_name localhost;
    
    # Basic settings
    client_max_body_size 100M;
    fastcgi_read_timeout 300s;
    proxy_read_timeout 300s;

    # ======================
    # Security Headers (P1 Fix)
    # ======================
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection in older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy - adjust as needed for your app
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss: https://cloudflareinsights.com https://static.cloudflareinsights.com; frame-ancestors 'self';" always;
    
    # Strict Transport Security (HSTS) - only enable after SSL is configured
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Permissions Policy (formerly Feature Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ======================
    # Soketi WebSocket Proxy
    # ======================
    location /app {
        set $soketi_upstream wificore-soketi:6071;
        proxy_pass http://$soketi_upstream;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    # ======================
    # Service Worker - NEVER cache (fixes stale workbox issues)
    # ======================
    location ~* (sw\.js|workbox-.*\.js)$ {
        set $frontend_upstream wificore-frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        access_log off;
    }

    # ======================
    # Cache static assets (must be before location /)
    # ======================
    # HTML files - NEVER cache (prevents stale chunk references after deployments)
    location ~* \.html$ {
        set $frontend_upstream wificore-frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
        set $frontend_upstream wificore-frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ======================
    # Vue Frontend
    # ======================
    location / {
        set $frontend_upstream wificore-frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ======================
    # Broadcasting Auth (for Pusher/Soketi)
    # ======================
    location /broadcasting/auth {
        set $backend_upstream wificore-backend:9000;
        proxy_pass http://$backend_upstream/api/broadcasting/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # ======================
    # GenieACS TR-069 CWMP (ACS) - Device Management
    # ======================
    location /acs {
        set $genieacs_cwmp_upstream wificore-genieacs-cwmp:7547;
        proxy_pass http://$genieacs_cwmp_upstream;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for TR-069 sessions
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Allow large payloads for firmware downloads
        client_max_body_size 500M;
    }

    # ======================
    # GenieACS NBI - REST API for SaaS Integration
    # ======================
    location /nbi {
        set $genieacs_nbi_upstream wificore-genieacs-nbi:7557;
        proxy_pass http://$genieacs_nbi_upstream;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ======================
    # GenieACS Web UI - Management Interface (Troubleshooting)
    # ======================
    location /web {
        set $genieacs_ui_upstream wificore-genieacs-ui:3000;
        proxy_pass http://$genieacs_ui_upstream;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ======================
    # GenieACS File Server - Firmware/Config Files
    # ======================
    location /fs {
        set $genieacs_fs_upstream wificore-genieacs-fs:7567;
        proxy_pass http://$genieacs_fs_upstream;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for large file transfers
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Allow large file uploads
        client_max_body_size 500M;
    }

    # ======================
    # Prometheus - Metrics Collection
    # ======================
    location /prometheus/ {
        set $prometheus_upstream wificore-prometheus:9090;
        proxy_pass http://$prometheus_upstream/;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /internal/vm/ {
        allow 172.70.0.0/16;
        deny all;

        proxy_pass http://wificore-victoriametrics:8428/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ======================
    # Grafana - Monitoring Dashboards
    # ======================
    location /grafana/ {
        set $grafana_upstream wificore-grafana:3000;
        proxy_pass http://$grafana_upstream/;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ======================
    # Laravel Backend API
    # ======================
    location ~ ^/api(/.*)?$ {
        set $backend_upstream wificore-backend:9000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # Let Laravel handle CORS - don't add duplicate headers here
    }

    # ======================
    # Security
    # ======================
    location ~* \.(env|git|dockerignore|yml|yaml|lock)$ {
        deny all;
    }

    # ======================
    # Logs
    # ======================
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
