# ============================================================================
# PostgreSQL Configuration — REFERENCE FILE
# ============================================================================
# IMPORTANT: This file is NOT mounted into the container. Actual PostgreSQL
# configuration is applied via command-line `-c` flags in docker-compose.yml.
# This file serves as the authoritative reference for those values.
#
# To apply changes:
# 1. Update the values here
# 2. Mirror changes to the `command:` section of wificore-postgres in
#    docker-compose.yml, docker-compose.production.yml, and
#    docker-compose-deployment.yml
# 3. Restart the postgres container
#
# Optimized for:
# - Multi-tenancy with schema-based isolation (100K+ potential tenants)
# - RADIUS authentication workload (high-frequency auth/acct)
# - Container deployment on SSD storage
# ============================================================================

# ----------------------------------------------------------------------------
# EXTENSIONS
# ----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ----------------------------------------------------------------------------
# CONNECTION SETTINGS
# ----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 5

# ----------------------------------------------------------------------------
# MEMORY SETTINGS
# ----------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB

# ----------------------------------------------------------------------------
# QUERY PLANNING
# ----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ----------------------------------------------------------------------------
# PARALLELISM
# ----------------------------------------------------------------------------
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ----------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL) + REPLICATION
# ----------------------------------------------------------------------------
wal_level = replica
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB
max_wal_senders = 10
max_replication_slots = 10

# ----------------------------------------------------------------------------
# LOGGING
# ----------------------------------------------------------------------------
log_min_duration_statement = 1000
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'Africa/Nairobi'

# ----------------------------------------------------------------------------
# AUTOVACUUM
# ----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# ----------------------------------------------------------------------------
# LOCALE AND FORMATTING
# ----------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'Africa/Nairobi'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# ----------------------------------------------------------------------------
# TIMEOUTS — Production safety nets
# ----------------------------------------------------------------------------
# Global statement timeout (30s default; migrations use SET LOCAL to override)
statement_timeout = 30000
# Kill idle-in-transaction sessions after 5 minutes (prevents lock hoarding)
idle_in_transaction_session_timeout = 300000
# DDL lock acquisition timeout (10s — fail fast instead of blocking)
lock_timeout = 10000

# ----------------------------------------------------------------------------
# MULTI-TENANCY OPTIMIZATION
# ----------------------------------------------------------------------------
max_locks_per_transaction = 256
