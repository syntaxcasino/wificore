# Schema-Based Multi-Tenancy Queries for FreeRADIUS
# These queries support tenant isolation by querying the correct schema based on username

# ======================
# Authorization Queries
# ======================

# Query to get user's schema from mapping table
authorize_schema_query = "\
    SELECT schema_name \
    FROM public.radius_user_schema_mapping \
    WHERE username = '%{SQL-User-Name}' \
    AND is_active = true \
    LIMIT 1"

# Query to check user credentials (schema-aware)
# This calls the PostgreSQL function that handles schema switching
authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM public.radius_authorize_check('%{SQL-User-Name}')"

# Query to get user reply attributes (schema-aware)
# This calls the PostgreSQL function that handles schema switching
authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM public.radius_authorize_reply('%{SQL-User-Name}')"

# Query to get user group membership
authorize_group_check_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupcheck \
    WHERE groupname IN ( \
        SELECT groupname \
        FROM radusergroup \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY priority \
    ) \
    ORDER BY id"

authorize_group_reply_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupreply \
    WHERE groupname IN ( \
        SELECT groupname \
        FROM radusergroup \
        WHERE username = '%{SQL-User-Name}' \
        ORDER BY priority \
    ) \
    ORDER BY id"

# ======================
# Accounting Queries
# ======================

# Accounting start query — routes to the correct tenant schema via stored procedure.
# Raw INSERT INTO radacct would write to public.radacct (the default schema of the
# FreeRADIUS DB connection). radius_accounting_start() calls get_user_schema() to
# resolve the tenant schema and inserts there instead.
accounting_start_query = "\
    SELECT public.radius_accounting_start(\
        '%{Acct-Session-Id}', \
        '%{Acct-Unique-Session-Id}', \
        '%{SQL-User-Name}', \
        '%{Realm}', \
        '%{NAS-IP-Address}', \
        '%{%{NAS-Port-ID}:-%{NAS-Port}}', \
        %{integer:Event-Timestamp}, \
        '%{Acct-Authentic}', \
        '%{Connect-Info}', \
        '%{Called-Station-Id}', \
        '%{Calling-Station-Id}', \
        '%{Service-Type}', \
        '%{Framed-Protocol}', \
        '%{Framed-IP-Address}'\
    )"

# Accounting update query — routes to the correct tenant schema via stored procedure.
# Raw UPDATE radacct would update public.radacct, so per-user bytes/duration would
# never reach the tenant schema that the API reads from.
accounting_update_query = "\
    SELECT public.radius_accounting_update(\
        '%{SQL-User-Name}', \
        '%{Acct-Unique-Session-Id}', \
        '%{Framed-IP-Address}', \
        %{%{Acct-Session-Time}:-0}, \
        %{%{Acct-Input-Octets}:-0}, \
        %{%{Acct-Output-Octets}:-0}\
    )"

# Accounting stop query — routes to the correct tenant schema via stored procedure.
accounting_stop_query = "\
    SELECT public.radius_accounting_stop(\
        '%{SQL-User-Name}', \
        '%{Acct-Unique-Session-Id}', \
        %{integer:Event-Timestamp}, \
        %{%{Acct-Session-Time}:-0}, \
        %{%{Acct-Input-Octets}:-0}, \
        %{%{Acct-Output-Octets}:-0}, \
        '%{Acct-Terminate-Cause}', \
        '%{Connect-Info}'\
    )"

# ======================
# Post-Auth Query
# ======================

# Post-auth query (schema-aware)
post_auth_query = "\
    INSERT INTO radpostauth \
    (username, pass, reply, authdate, class) \
    VALUES \
    ('%{SQL-User-Name}', \
     '%{%{User-Password}:-%{Chap-Password}}', \
     '%{reply:Packet-Type}', \
     NOW(), \
     '%{reply:Class}')"
