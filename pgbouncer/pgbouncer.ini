[databases]
; Main app DB. Keep explicit so pool mode can be changed safely per deployment.
wms_770_ts = host=wificore-postgres port=5432 dbname=wms_770_ts pool_mode=__APP_POOL_MODE__
; FreeRADIUS uses SECURITY DEFINER functions — no session state needed.
; Transaction mode prevents 32 permanent idle server connections.
wms_770_ts_radius = host=wificore-postgres port=5432 dbname=wms_770_ts pool_mode=transaction pool_size=40
* = host=wificore-postgres port=5432 dbname=wms_770_ts

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; =============================================================================
; Connection Pooling Settings - Optimized for SaaS Multi-Tenant Workload
; =============================================================================
; Default to transaction pooling for better connection reuse.
; The main application database can still override this per-entry.
pool_mode = __DEFAULT_POOL_MODE__

; Client connection limits
max_client_conn = 10000

; Pool sizing - keep defaults conservative and override via environment
; after measuring PostgreSQL CPU and active connection pressure.
default_pool_size = __DEFAULT_POOL_SIZE__
min_pool_size = __MIN_POOL_SIZE__
max_db_connections = __MAX_DB_CONNECTIONS__
max_user_connections = __MAX_USER_CONNECTIONS__

; Reserve pool for burst handling
reserve_pool_size = __RESERVE_POOL_SIZE__
reserve_pool_timeout = 3

; =============================================================================
; Server Connection Settings - Optimized for Low Latency
; =============================================================================
; Server lifetime - recycle connections periodically to prevent memory bloat
server_lifetime = 600
server_idle_timeout = 120
server_connect_timeout = 10
server_login_retry = 10
server_reset_query = DISCARD ALL
server_reset_query_always = 1

; Connection retry settings
server_fast_close = 0

; =============================================================================
; Query Settings - Prevent Runaway Queries
; =============================================================================
query_timeout = 0
query_wait_timeout = 60
client_idle_timeout = 0
idle_transaction_timeout = 0
client_login_timeout = 60

; Cancel wait timeout - how long to wait for cancel request
cancel_wait_timeout = 10

; =============================================================================
; Performance Tuning
; =============================================================================
; Note: tcp_nodelay and tcp_socket_buffer are not valid PgBouncer parameters
; These are OS-level settings that should be configured via sysctl

; Synchronize DNS lookups
dns_max_ttl = 15
dns_nxdomain_ttl = 15
dns_zone_check_period = 0

; =============================================================================
; Logging - Reduced for Production Performance
; =============================================================================
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 0

; Stats settings
stats_period = 300

; Verbose logging (set to 1 for debugging)
verbose = 0

; Admin interface
admin_users = admin,postgres
stats_users = admin,postgres

; =============================================================================
; Security Settings
; =============================================================================
client_tls_sslmode = disable
server_tls_sslmode = disable
